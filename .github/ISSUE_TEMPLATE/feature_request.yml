name: Feature Request
description: 機能追加・改善提案テンプレート
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        新機能や改善提案を歓迎します。特に「なぜ必要か」が明確だと議論しやすくなります。

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 提案内容を簡潔に記載してください。
      placeholder: 例: items API に検索条件を追加したい
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Current Pain
      description: 現在どのような課題があるかを記載してください。
      placeholder: 現状の困りごと、制約、非効率な点など
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why now / Why this matters
      description: なぜこの変更が必要か、今優先する理由を記載してください。
      placeholder: |
        例:
        - ユーザー価値が高い
        - 運用コストを下げられる
        - 既存のワークフロー改善につながる
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: 期待する解決案を記載してください。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: 検討した代替案や、なぜ採用しなかったかを記載してください。

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 完了条件や期待する振る舞いを記載してください。
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: 関連資料、モック、参考リンクなどがあれば記載してください。
