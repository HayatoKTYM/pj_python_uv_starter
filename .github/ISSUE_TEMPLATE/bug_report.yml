name: Bug Report
description: 不具合の報告テンプレート
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ありがとうございます。再現性と背景が分かるほど、調査と修正が早くなります。

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 不具合の概要を簡潔に記載してください。
      placeholder: 例: `/api/v1/items` で 500 エラーが発生する
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why this matters
      description: なぜこの問題の対応が必要かを記載してください。
      placeholder: |
        例:
        - ユーザーが主要機能を利用できない
        - 運用上の手戻りや問い合わせが増えている
        - リリース前に解消が必要
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: 再現手順を番号付きで記載してください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: 本来どうなるべきかを記載してください。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: 実際に何が起きたかを記載してください。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: 実行環境やバージョン情報を記載してください。
      placeholder: |
        - OS:
        - Python:
        - uv:
        - Browser / Client:

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: ログ、スクリーンショット、関連 Issue などがあれば記載してください。
